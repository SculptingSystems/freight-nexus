services:

  db:
    image: postgres:16
    container_name: freight_db
    environment:
      POSTGRES_DB: freightdb
      POSTGRES_USER: freight
      POSTGRES_PASSWORD: ${DB_PASSWORD:-freight123}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freight -d freightdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: freight_app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/freightdb?TimeZone=UTC
      SPRING_DATASOURCE_USERNAME: freight
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-freight123}
      APP_JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
